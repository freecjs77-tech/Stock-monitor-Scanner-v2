<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}관심 종목 리포트{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060D18;
  --panel: #0A1525;
  --row1: #0D1B2C;
  --row2: #111F30;
  --border: #1A3050;
  --accent: #2563EB;
  --text: #EEF4FB;
  --mid: #A8C4DE;
  --sub: #4E6E8E;
  --green: #34D399;
  --orange: #FBBF24;
  --red: #F87171;
  --gray: #64748B;
  --green-bg: #052E16;
  --orange-bg: #292524;
  --red-bg: #2A0A0A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.6;
}
.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
.accent-bar { height: 4px; background: var(--accent); margin-bottom: 0; }

/* 헤더 */
.page-header {
  background: var(--panel);
  padding: 20px 24px;
  border-bottom: 2.5px solid var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
.page-header .date { font-size: 12px; color: var(--sub); }

/* 테이블 */
table { width: 100%; border-collapse: collapse; }
th {
  background: #081220;
  color: var(--mid);
  font-size: 11px;
  font-weight: 600;
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1.5px solid var(--accent);
}
td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 0.3px solid var(--border);
  font-size: 13px;
}
tr:nth-child(odd)  td { background: var(--row1); }
tr:nth-child(even) td { background: var(--row2); }
.td-left { text-align: left; padding-left: 12px; }

/* 배지 */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
}
.badge-entry3  { color: #00E676; background: rgba(0,230,118,0.12); }
.badge-entry2  { color: #26C6DA; background: rgba(38,198,218,0.12); }
.badge-entry1  { color: #FFEE58; background: rgba(255,238,88,0.12); }
.badge-caution { color: #FFA726; background: rgba(255,167,38,0.12); }
.badge-sell    { color: #EF5350; background: rgba(239,83,80,0.12); }
.badge-watch   { color: #FFFFFF; background: rgba(255,255,255,0.06); }
/* Exit v2.5 배지 */
.badge-exit-hot   { color: #FF1744; background: rgba(255,23,68,0.15);   font-size:10px; padding:2px 7px; border-radius:3px; font-weight:700; }
.badge-exit-break { color: #EF5350; background: rgba(239,83,80,0.12);   font-size:10px; padding:2px 7px; border-radius:3px; font-weight:700; }
.badge-exit-weak  { color: #FFA726; background: rgba(255,167,38,0.12);  font-size:10px; padding:2px 7px; border-radius:3px; font-weight:700; }
.badge-exit-warn  { color: #FFEE58; background: rgba(255,238,88,0.10);  font-size:10px; padding:2px 7px; border-radius:3px; font-weight:700; }

/* 색상 유틸 */
.c-green  { color: var(--green); }
.c-orange { color: var(--orange); }
.c-red    { color: var(--red); }
.c-gray   { color: var(--gray); }
.c-sub    { color: var(--sub); }
.c-mid    { color: var(--mid); }
.bold     { font-weight: 700; }

/* 섹션 타이틀 */
.section-title {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 0.8px solid var(--accent);
  padding-bottom: 6px;
  margin-bottom: 12px;
}
.section-title h2 { font-size: 13px; font-weight: 700; color: var(--mid); }
.section-title span { font-size: 11px; color: var(--sub); }

/* 조건 테이블 */
.cond-table td:first-child {
  font-weight: 700;
  font-size: 11px;
  white-space: nowrap;
  min-width: 70px;
}
.cond-table .cond-text {
  text-align: left;
  padding-left: 12px;
  font-size: 11.5px;
  color: var(--mid);
  line-height: 1.7;
}

/* 카드 그리드 (종목 페이지) */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 16px 0;
}
.metric-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
}
.metric-card .label { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
.metric-card .value { font-size: 20px; font-weight: 700; }
.metric-card .direction { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* 52주 바 */
.range-bar-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin: 12px 0; }
.range-bar { height: 8px; background: var(--border); border-radius: 4px; position: relative; margin: 8px 0; }
.range-bar .filled { height: 100%; background: var(--accent); border-radius: 4px; }
.range-bar .marker { position: absolute; top: -4px; width: 16px; height: 16px; background: white; border: 2px solid var(--accent); border-radius: 50%; transform: translateX(-50%); }

/* 요약 박스 */
.summary-box {
  border-radius: 6px;
  padding: 14px 16px;
  margin: 12px 0;
  border-left: 4px solid;
}
.summary-box.buy    { background: var(--green-bg);  border-color: var(--green); }
.summary-box.entry  { background: var(--orange-bg); border-color: var(--orange); }
.summary-box.sell   { background: var(--red-bg);    border-color: var(--red); }
.summary-box.watch  { background: var(--row2);      border-color: var(--gray); }

/* 액션 섹션 */
.action-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 0.3px solid var(--border);
}
.action-icon { font-size: 18px; flex-shrink: 0; }
.action-content .title { font-size: 12px; font-weight: 700; color: var(--mid); margin-bottom: 2px; }
.action-content .desc  { font-size: 13px; }

/* 차트 */
.chart-wrap { text-align: center; margin: 12px 0; }
.chart-wrap img { max-width: 100%; border-radius: 6px; }

/* 네비게이션 */
.nav-bar {
  background: var(--panel);
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-bar a {
  color: var(--mid);
  text-decoration: none;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.nav-bar a:hover { background: var(--row1); color: var(--text); }
.nav-bar a.active { background: var(--accent); color: white; border-color: var(--accent); }

/* 푸터 */
.footer {
  text-align: center;
  color: var(--sub);
  font-size: 11px;
  padding: 20px 0;
  border-top: 0.4px solid var(--border);
  margin-top: 24px;
}

/* 반응형 */
@media (max-width: 600px) {
  .metric-grid { grid-template-columns: repeat(2, 1fr); }
  .page-header { flex-direction: column; gap: 8px; }
}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<div class="accent-bar"></div>
{% block nav %}{% endblock %}
{% block content %}{% endblock %}
<div class="container">
  <div class="footer">
    본 보고서는 AI 기반 자동 기술적 분석으로, 투자 권유가 아닙니다.<br>
    Data: Yahoo Finance (yfinance) | AI Chart Analyst 2026
  </div>
</div>
</body>
</html>
