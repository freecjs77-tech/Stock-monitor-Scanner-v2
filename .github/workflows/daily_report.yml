name: Mag7 Daily Report

on:
  schedule:
    # 매일 오전 9:00 KST (= 00:00 UTC) 월~금 실행
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    # 수동 실행 버튼 (GitHub Actions 탭에서 언제든 실행 가능)

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Korean font for matplotlib (optional)
        run: |
          sudo apt-get install -y fonts-nanum 2>/dev/null || true

      - name: Generate Mag7 reports (real data via yfinance)
        run: python local_mag7_real.py

      - name: Send report via Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_sender.py

      - name: Upload PDF as artifact (백업)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mag7-report-${{ github.run_id }}
          path: cowork_agents/reports/Mag7_Daily_Report_*.pdf
          retention-days: 7
