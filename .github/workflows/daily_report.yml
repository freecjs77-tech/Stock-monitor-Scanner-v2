name: Mag7 Daily Report

on:
  schedule:
    # 매일 오전 9:00 KST (= 00:00 UTC) 월~금
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    # GitHub Actions 탭 또는 Streamlit UI "▶ 지금 실행" 버튼으로 수동 실행

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show tickers to be processed
        run: |
          echo "=== tickers.json ==="
          cat tickers.json

      - name: Generate reports (real data via yfinance)
        run: python local_mag7_real.py

      - name: Send report via Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_sender.py

      - name: Send report via Email
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          MAIL_TO:      ${{ secrets.MAIL_TO }}
        run: python email_sender.py

      - name: Commit updated price data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cowork_agents/mag7_data.json
          git diff --staged --quiet || git commit -m "chore: update mag7_data.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF as artifact (7일 보관)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mag7-report-${{ github.run_id }}
          path: cowork_agents/reports/Mag7_Daily_Report_*.pdf
          retention-days: 7
