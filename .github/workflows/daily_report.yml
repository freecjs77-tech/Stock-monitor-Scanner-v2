# ⚠️ 구형 워크플로우 — 비활성화됨 (daily.yml로 통합)
# UI 트리거 및 스케줄은 daily.yml 사용
name: "[DEPRECATED] Mag7 Daily Report"

on:
  workflow_dispatch:
    # 비활성화: daily.yml을 사용하세요

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show tickers to be processed
        run: |
          echo "=== tickers.json ==="
          cat tickers.json

      - name: Generate reports (real data via yfinance)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python local_mag7_real.py

      - name: Send report via Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_sender.py

      - name: Send report via Email
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          MAIL_TO:      ${{ secrets.MAIL_TO }}
        run: python email_sender.py

      - name: Commit updated price data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cowork_agents/mag7_data.json
          git diff --staged --quiet || git commit -m "chore: update mag7_data.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF as artifact (7일 보관)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mag7-report-${{ github.run_id }}
          path: cowork_agents/reports/Mag7_Daily_Report_*.pdf
          retention-days: 7
